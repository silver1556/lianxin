# Development Docker Compose Configuration
# Use this for local development with hot reloading and debugging

services:
  nginx:
    image: nginx:alpine
    container_name: lianxin-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443" #ssl (optional untill ssl set)
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - lianxin-dev-network

  # Modular monolith (single Node app)

  # MySQL Database (same as production)
  mysql:
    image: mysql:8.0
    container_name: lianxin-mysql-dev
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./mysql-config:/etc/mysql/conf.d:ro
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - lianxin-dev-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 40s

  # Redis Cache (same as production)
  redis:
    image: redis:7-alpine
    container_name: lianxin-redis-dev
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    command: >
      redis-server /usr/local/etc/redis/redis-dev.conf
      --dir /data
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis-config/redis-dev.conf:/usr/local/etc/redis/redis-dev.conf
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lianxin-dev-network

  # ClamAV Antivirus Scanner (only used by Media module)- later

  # Database Administration
  adminer:
    image: adminer:4.8.1
    container_name: lianxin-adminer-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - mysql
    networks:
      - lianxin-dev-network

  # Redis Commander (GUI for Redis)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lianxin-redis-commander-dev
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8081:8081"
    environment:
      # Change from REDIS_HOSTS to individual connection variables
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lianxin-dev-network

  # File Processing Monitor (Bull Dashboard)
  bull-board:
    build:
      context: .
      dockerfile: ./services/bull-board/Dockerfile.dev
    container_name: lianxin-bull-board-dev
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./services/bull-board/src:/app/src
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lianxin-dev-network

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  #clamav_dev_data:
  #  driver: local
  #clamav_dev_logs:
  #  driver: local

networks:
  lianxin-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
