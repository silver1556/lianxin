# Redis configuration for Lianxin platform

# Network
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 300

# General
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""

# Snapshotting
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Replication
replica-serve-stale-data yes
replica-read-only yes

# Security
requirepass Mahmud1334@

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Append only file
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Lua scripting
lua-time-limit 5000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Advanced config
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# Additional Performance Tuning
# Enable Redis to handle more concurrent connections
maxclients 10000

# Configure TCP backlog
tcp-backlog 511

# Enable latency monitoring
latency-monitor-threshold 100

# Configure databases (default is 16)
databases 16

# Enable notifications for key space events (useful for monitoring)
notify-keyspace-events ""

# Configure protected mode (disable if using password)
protected-mode no

# Configure client query buffer limit
client-query-buffer-limit 1gb

# Configure client memory usage tracking
tracking-table-max-keys 1000000

# Enable active defragmentation (Redis 4.0+)
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# Configure memory usage for different data structures
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Configure HyperLogLog sparse representation
hll-sparse-max-bytes 3000

# Configure stream data structure
stream-node-max-bytes 4096
stream-node-max-entries 100

# Configure replication
repl-backlog-size 1mb
repl-backlog-ttl 3600
repl-timeout 60
repl-ping-replica-period 10

# Configure persistence
rdb-save-incremental-fsync yes
aof-rewrite-incremental-fsync yes
aof-load-truncated yes
aof-use-rdb-preamble yes

# Disable some commands for security (uncomment if needed)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""
# rename-command CONFIG "CONFIG_9a8b7c6d5e4f"

# Enable module loading (if using Redis modules)
# loadmodule /path/to/module.so

# Configure memory policy for different scenarios
# For cache-only usage: allkeys-lru, allkeys-lfu, allkeys-random
# For persistent data: noeviction, volatile-lru, volatile-lfu, volatile-random, volatile-ttl
maxmemory-policy allkeys-lru