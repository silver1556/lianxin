# Production Docker Compose Configuration
# Use this for production deployment with optimized settings

version: "3.8"

services:
  # MySQL Database with production optimizations
  mysql:
    image: mysql:8.0
    container_name: lianxin-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_prod_data:/var/lib/mysql
      - ./services/user-service/db/migrations:/docker-entrypoint-initdb.d:ro
      - ./mysql-config:/etc/mysql/conf.d:ro
      - ./backups/mysql:/backups
    networks:
      - lianxin-prod-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache with production settings
  redis:
    image: redis:7-alpine
    container_name: lianxin-redis-prod
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_prod_data:/data
      - ./redis-config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - lianxin-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      timeout: 3s
      retries: 5
      interval: 30s
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Gateway (Production)
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      target: production
    container_name: lianxin-gateway-prod
    restart: always
    expose:
      - "${GATEWAY_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${GATEWAY_PORT}
      - USER_SERVICE_URL=http://user-service:${USER_SERVICE_PORT}
      - LOG_LEVEL=warn
      - RATE_LIMIT_ENABLED=true
    depends_on:
      user-service:
        condition: service_healthy
    networks:
      - lianxin-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GATEWAY_PORT}/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # User Service (Production)
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
      target: production
    container_name: lianxin-user-service-prod
    restart: always
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${USER_SERVICE_PORT}
      - DB_HOST=mysql
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_ACCESS_TOKEN_SECRET=${JWT_ACCESS_TOKEN_SECRET}
      - JWT_REFRESH_TOKEN_SECRET=${JWT_REFRESH_TOKEN_SECRET}
      - ENCRYPTION_PRIMARY_KEY=${ENCRYPTION_PRIMARY_KEY}
      - ENCRYPTION_SECONDARY_KEY=${ENCRYPTION_SECONDARY_KEY}
      - LOG_LEVEL=warn
      - ENABLE_AUDIT_LOGGING=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/user-service/logs:/app/logs
      - ./backups/user-service:/app/backups
    networks:
      - lianxin-prod-network
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:${USER_SERVICE_PORT}/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Nginx Load Balancer (Production)
  nginx:
    image: nginx:alpine
    container_name: lianxin-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - gateway
    networks:
      - lianxin-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      timeout: 10s
      retries: 3
      interval: 30s

volumes:
  mysql_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  lianxin-prod-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
