# Development Docker Compose Configuration
# Use this for local development with hot reloading and debugging

services:
  nginx:
    image: nginx:alpine
    container_name: lianxin-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443" #ssl (optional untill ssl set)
    volumes:
      - ./nginx-config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - lianxin-dev-network

  # Modular monolith (single Node app)
  app:
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    container_name: lianxin-app-dev
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
      - PORT=3000
      # DBs for each module
      - DB_NAME_USER_SERVICE=${DB_NAME_USER_SERVICE}
      - DB_NAME_PLACE_SERVICE=${DB_NAME_PLACE_SERVICE}
      - DB_NAME_MEDIA_SERVICE=${DB_NAME_MEDIA_SERVICE}
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
        # ClamAV (used only in media module)
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310

      - JWT_ACCESS_TOKEN_SECRET=${JWT_ACCESS_TOKEN_SECRET:-dev-jwt-access-secret}
      - JWT_REFRESH_TOKEN_SECRET=${JWT_REFRESH_TOKEN_SECRET:-dev-jwt-refresh-secret}
      - JWT_PASSWORD_RESET_TOKEN_SECRET=${JWT_PASSWORD_RESET_TOKEN_SECRET:-dev-jwt-password-reset-secret}
      - ENCRYPTION_PRIMARY_KEY=${ENCRYPTION_PRIMARY_KEY:-dev-encryption-key-32-characters}
      - ENCRYPTION_SECONDARY_KEY=${ENCRYPTION_SECONDARY_KEY:-dev-secondary-key-32-characters}
      - LOG_LEVEL=debug
      - ENABLE_DEBUG_MODE=true
    ports:
      - "3000:3000"
      - "9229:9229" # Node.js debugging port
    volumes:
      # Mount source code for hot reloading
      - ./src:/app/src
      # Mount database migrations folder for development
      - ./services/user-service/db:/app/db:ro
      - ./services/user-service/.sequelizerc:/app/.sequelizerc:ro
      - ./services/media-service/db:/app/db:ro
      - ./services/media-service/.sequelizerc:/app/.sequelizerc:ro
      - ./services/place-service/db:/app/db:ro
      - ./services/place-service/.sequelizerc:/app/.sequelizerc:ro
      # Mount shared folder for development
      - ./shared:/app/shared
      # Mount logs directory
      - ./logs:/app/logs
      # Preserve node_modules in container
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lianxin-dev-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 120s
  # MySQL Database (same as production)
  mysql:
    image: mysql:8.0
    container_name: lianxin-mysql-dev
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./mysql-config:/etc/mysql/conf.d:ro
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - lianxin-dev-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 40s

  # Redis Cache (same as production)
  redis:
    image: redis:7-alpine
    container_name: lianxin-redis-dev
    env_file:
      - ./.env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379" # dev uses 6380 on host
    command: redis-server /usr/local/etc/redis/redis-dev.conf --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis-config/redis-dev.conf:/usr/local/etc/redis/redis-dev.conf
      - redis_dev_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "ping"]
      timeout: 5s
      retries: 5
      interval: 10s
      start_period: 30s
    restart: unless-stopped
    networks:
      - lianxin-dev-network

  # ClamAV Antivirus Scanner (only used by Media module)- later

  # Database Administration
  adminer:
    image: adminer:4.8.1
    container_name: lianxin-adminer-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - mysql
    networks:
      - lianxin-dev-network

  # Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lianxin-redis-commander-dev
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    depends_on:
      - redis
    networks:
      - lianxin-dev-network

  # File Processing Monitor (Bull Dashboard)
  bull-board:
    build:
      context: .
      dockerfile: ./services/bull-board/Dockerfile.dev
    container_name: lianxin-bull-board-dev
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./services/bull-board/src:/app/src
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lianxin-dev-network

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  #clamav_dev_data:
  #  driver: local
  #clamav_dev_logs:
  #  driver: local

networks:
  lianxin-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
