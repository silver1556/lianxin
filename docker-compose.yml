version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: lianxin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/user-service/db/migrations:/docker-entrypoint-initdb.d:ro
      - ./mysql-config:/etc/mysql/conf.d:ro
    networks:
      - lianxin-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 40s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lianxin-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
      - ./redis-config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - lianxin-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      timeout: 3s
      retries: 5
      interval: 30s
      start_period: 10s

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: lianxin-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${GATEWAY_PORT}
      - USER_SERVICE_URL=http://user-service:${USER_SERVICE_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED}
    depends_on:
      - user-service
    networks:
      - lianxin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GATEWAY_PORT}/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s

  # User Service
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: lianxin-user-service
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${USER_SERVICE_PORT}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_ACCESS_TOKEN_SECRET=${JWT_ACCESS_TOKEN_SECRET}
      - JWT_REFRESH_TOKEN_SECRET=${JWT_REFRESH_TOKEN_SECRET}
      - ENCRYPTION_PRIMARY_KEY=${ENCRYPTION_PRIMARY_KEY}
      - ENCRYPTION_SECONDARY_KEY=${ENCRYPTION_SECONDARY_KEY}
      - LOG_LEVEL=${LOG_LEVEL}
      - ENABLE_AUDIT_LOGGING=${AUDIT_ENABLED}
    volumes:
      - ./services/user-service/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lianxin-network
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:${USER_SERVICE_PORT}/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 60s

  # Database Administration
  adminer:
    image: adminer:4.8.1
    container_name: lianxin-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - mysql
    networks:
      - lianxin-network

  # Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lianxin-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD}
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    depends_on:
      - redis
    networks:
      - lianxin-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  lianxin-network:
    driver: bridge
